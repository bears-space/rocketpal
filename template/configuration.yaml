# Identificator for Simulation/Export
ID: STARGAZE # ID used for simulation run and export
# Input Options
location: Campo Militar de Santa Margarida # ID for location file at which simulation shall be executed
weatherConfig: standard-atmosphere # ID of weather config file to use
motor: Cesaroni_6800M3700-P # ID of used motor for simulation
parachutes: [stargaze-main, stargaze-drogue] # IDs of parachutes to add to rocket
airbrakes: [stargaze-airbrake] # IDs of airbrakes to add to rocket
dateDiff: 7 # day difference relative to today for which simulation shall be executed
railL: 12 # launch rail length in meter
inclination: 84 # launch inclination from ground in degree
heading: 133 # launch heading relative to north in degree
dragCurvePowerOnFile: None # optional!; name of file with drag curve for rocket with power on
dragCurvePowerOffFile: None # optional!; name of file with drag curve for rocket with power off
diameter: 0.1236 # diameter of the rocket in m
launch_date: 2025-10-12_12-00-00

# Monte Carlo Options
number_of_simulations: 1000
parallel: True
n_workers: 16

# Export Options
exportFlightDataTimeStepSeconds: 0.01
