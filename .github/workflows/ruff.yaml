name: Ruff

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Ruff Linting
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.2"
          args: "check"

      - name: Check Ruff Formatting
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.2"
          args: "format --check --diff"
