name: Ruff

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check Ruff Linting
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.12.7"
          args: "check"

      - name: Check Ruff Formatting
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.12.7"
          args: "format --check --diff"
